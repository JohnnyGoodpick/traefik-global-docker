http:
  middlewares:
    security-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          Cross-Origin-Opener-Policy: "same-origin"
          Permissions-Policy: "camera=(), microphone=(), usb=(), gyroscope=(), magnetometer=(), fullscreen=(self), geolocation=(self), payment=(self)"

    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: "1s"
        sourceCriterion:
          ipStrategy:
            depth: 1
